services:
  app:
    build:
      context: .
      dockerfile: infra/Dockerfile
    container_name: aipedia-app
    ports:
      - "8080:8080"
    volumes:
      - ./web:/app
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: aipedia
      DB_USERNAME: root
      DB_PASSWORD: root
      QUEUE_CONNECTION: database
      CACHE_DRIVER: file
      SESSION_DRIVER: file
    env_file:
      - web/.env
    restart: unless-stopped
    networks:
      - app_network

networks:
  app_network:
    external: true
    name: app_network
