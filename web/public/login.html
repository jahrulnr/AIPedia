<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login | Aipedia</title>
    <link rel="stylesheet" href="vendor/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="vendor/bootstrap-icons/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container-fluid p-0 min-vh-100 d-flex">
    <div class="row g-0 w-100">
        <div class="col-lg-4 col-md-5 bg-white d-flex flex-column justify-content-center p-4 p-md-5">
            <div class="mx-auto" style="max-width: 360px; width: 100%;">
                <a href="index.html" class="auth-logo">
                    <i class="bi bi-layers-fill"></i>
                    <span>Aipedia</span>
                </a>
                <h5 class="mb-1">Welcome Back !</h5>
                <p class="text-muted mb-4">Sign in to continue to CMS.</p>

                <form action="index.html" method="get">
                    <div class="form-floating mb-3 form-floating-custom">
                        <input type="email" class="form-control" id="email" placeholder="Email" required autofocus>
                        <label for="email">Email</label>
                        <span class="form-floating-icon"><i class="bi bi-person"></i></span>
                    </div>

                    <div class="form-floating mb-4 form-floating-custom">
                        <input type="password" class="form-control" id="password" placeholder="Password" required>
                        <label for="password">Password</label>
                        <span class="form-floating-icon"><i class="bi bi-lock"></i></span>
                        <button type="button" class="password-toggle" id="togglePassword" tabindex="-1">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>

                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="remember">
                            <label class="form-check-label text-muted small" for="remember">Remember me</label>
                        </div>
                        <a href="#" class="small text-decoration-none">Forgot password?</a>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-2 mb-3">Log In</button>
                </form>

                <p class="text-center text-muted small mb-0">
                    &copy; <script>document.write(new Date().getFullYear())</script> Aipedia. All rights reserved.
                </p>
            </div>
        </div>
        <div class="col-lg-8 col-md-7 auth-bg-side d-none d-md-flex">
            <div class="text-center px-4" style="max-width: 600px;">
                <i class="bi bi-shield-check display-1 mb-4 opacity-75"></i>
                <h2 class="fw-bold mb-3">Secure Content Management</h2>
                <p class="lead opacity-75 mb-0">Manage your digital content, campaigns, and assets from a single, powerful dashboard.</p>
            </div>
        </div>
    </div>
</div>

<script src="vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
<script src="js/main.js"></script>
</body>
</html>
